# 股票全域过滤规则配置 (Single Source of Truth)

# 核心指数白名单
indices:
  - "000001" # 上证综指
  - "399001" # 深证成指
  - "399006" # 创业板指
  - "000300" # 沪深300
  - "000905" # 中证500
  - "000852" # 中证1000
  - "000016" # 上证50
  - "000688" # 科创50
  - "899050" # 北证50

# ETF 允许规则 (需包含常用 ETF 前缀，否则 Redis 传来的代码会被 Collector 拦截丢弃)
etf_prefixes:
  - "51" # 沪市 ETF 常用前缀 (如 510300)
  - "15" # 深市 ETF 常用前缀 (如 159915)
  - "58" # 科创板 ETF 常用前缀 (如 588090)

# 允许的 A 股市场前缀
