syntax = "proto3";

package datasource.v1;

// 数据类型枚举
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_QUOTES = 1;          // 实时行情
  DATA_TYPE_TICK = 2;            // 分笔数据
  DATA_TYPE_HISTORY = 3;         // 历史K线
  DATA_TYPE_RANKING = 4;         // 榜单数据 (人气、涨幅等)
  DATA_TYPE_SECTOR = 5;          // 板块数据
  DATA_TYPE_FINANCE = 6;         // 财务数据
  DATA_TYPE_VALUATION = 7;       // 估值数据
  DATA_TYPE_INDEX = 8;           // 指数成分
  DATA_TYPE_INDUSTRY = 9;        // 行业数据
  DATA_TYPE_META = 10;           // 股票元数据
  DATA_TYPE_ISSUE_PRICE = 11;    // 发行价
  DATA_TYPE_SW_INDUSTRY = 12;    // 申万行业分类
  DATA_TYPE_FEATURES = 13;       // 特征矩阵
  DATA_TYPE_THS_INDUSTRY = 14;   // 同花顺行业分类
  DATA_TYPE_THS_CONCEPTS = 15;   // 同花顺概念板块
  DATA_TYPE_FUTURES_KLINE_DAILY = 16; // 原油/期货日K线
}

// 通用数据请求
message DataRequest {
  DataType type = 1;
  repeated string codes = 2;              // 股票代码列表
  map<string, string> params = 3;         // 动态参数 (如 start_date, frequency, indicator)
  string request_id = 4;                  // 追踪ID
}

// 通用数据响应
message DataResponse {
  bool success = 1;
  string error_message = 2;
  
  // 数据载荷 (支持多种格式，避免过早反序列化)
  oneof payload {
    bytes binary_data = 3;        // 原始二进制 (如 Pickle, Arrow)
    string json_data = 4;         // JSON 字符串
  }
  
  string source_name = 5;         // 数据源名称 (如 "mootdx")
  int64 latency_ms = 6;           // 耗时
  string format = 7;              // 数据格式描述 (PROTBUF, JSON, CSV)
}

// 能力声明
message Capabilities {
  repeated DataType supported_types = 1;
  int32 priority = 2;
  string version = 3;
}

message Empty {}

// 数据源微服务接口
service DataSourceService {
  // 获取数据
  rpc FetchData(DataRequest) returns (DataResponse);
  
  // 获取服务能力
  rpc GetCapabilities(Empty) returns (Capabilities);
  
  // 健康检查
  rpc HealthCheck(Empty) returns (HealthStatus);
}

message HealthStatus {
  bool healthy = 1;
  string message = 2;
}
