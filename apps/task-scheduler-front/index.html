<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="企业级前端模板框架 - 基于Vue 3 + TypeScript + Element Plus" />
    <meta name="keywords" content="vue3,typescript,element-plus,frontend-template,component-library" />
    <title>Frontend Template - 企业级前端模板框架</title>
  </head>
  <body>
    <div id="app">
      <div id="loading">
        <style>
          #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          }

          .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
          }

          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }

          .loading-text {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
          }

          .loading-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
          }
        </style>
        <div class="loading-spinner"></div>
        <div class="loading-text">Frontend Template</div>
        <div class="loading-subtitle">正在加载模板框架...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
