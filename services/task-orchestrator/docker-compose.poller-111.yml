version: '3.8'

services:
  shard-poller:
    image: task-orchestrator:latest
    container_name: gsd-shard-poller
    command: ["python", "-m", "shard_poller", "--shard", "2"]
    environment:
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=36301
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=task_orchestrator
      - DOCKER_HOST=unix:///var/run/docker.sock
      - TZ=Asia/Shanghai
      - ORCHESTRATOR_WORKER_NETWORK=host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/tasks_111.yml:/app/config/tasks.yml:ro
    network_mode: host
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
