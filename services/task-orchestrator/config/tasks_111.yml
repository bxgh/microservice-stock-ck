# Task Orchestrator 任务配置 (Server 111)
version: "1.0"
timezone: "Asia/Shanghai"

global:
  docker:
    image: gsd-worker:latest
    network_mode: host
    default_volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./services/gsd-worker/config:/app/config:ro
    environment:
      PYTHONPATH: /app/src

tasks:
  - id: daily_tick_sync_shard_2
    name: 盘后分笔采集与补采(Shard-2)
    type: workflow
    enabled: true
    schedule:
      type: trading_cron
      expression: "35 15 * * 1-5"
    workflow:
      - id: collect
        name: 分片采集
        command: ["jobs.sync_tick", "--scope", "all", "--shard-index", "2", "--shard-total", "3"]
      - id: retry
        name: 自动补采
        command: ["jobs.retry_tick", "--concurrency", "5"]
        depends_on: [collect]
    retry:
      max_attempts: 2
      backoff_seconds: 600

  - id: daily_kline_sync_shard_2
    name: K线每日同步(Shard-2)
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "30 17 * * *"
    target:
      command: ["jobs.sync_kline", "--mode", "adaptive", "--shard-index", "2"]
    retry:
      max_attempts: 2
      backoff_seconds: 600
