
name: post_market_audit
description: 盘后数据治理驱动管线 (Probe -> Audit & Purge -> Repair -> Strategy)
steps:
  # 1. K线阻塞探测 (发令枪)
  - id: kline_barrier
    task_id: wait_for_kline
    params:
      threshold: 99.5
      timeout: 7200
  
  # 2. 全维度审计与物理清理 (审计过程中发现异常即刻删除)
  - id: run_audit
    task_id: calculate_data_quality
    depends_on: [kline_barrier]
    params:
      threshold: 1000

  # 3. AI 辅助确认 (Zone 2 黄区触发)
  - id: ai_review
    task_id: ai_quality_gatekeeper
    depends_on: [run_audit]
    params:
      input_data: "{{ run_audit.abnormal_list }}" 
      trigger_condition: "{{ run_audit.diagnosis.action }}"

  # 4. 定向补采与修复
  - id: execute_repair
    task_id: stock_data_supplement
    depends_on: [run_audit, ai_review]
    params:
      sys_action: "{{ run_audit.diagnosis.action }}"
      sys_missing: "{{ run_audit.missing_list }}"
      sys_confirmed_bad: "{{ ai_review.confirmed_bad_codes }}"
      force_concurrency: "64"
      force_local: "{{ run_audit.diagnosis.failover_mode }}"

  # 5. 最终触发策略扫描 (由于链式依赖，只有在修复成功后才会执行)
  - id: strategy_scan
    task_id: daily_strategy_scan
    depends_on: [execute_repair]
