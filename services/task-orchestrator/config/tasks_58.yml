# Task Orchestrator 任务配置 (Server 58)
version: "1.0"
timezone: "Asia/Shanghai"

global:
  docker:
    image: gsd-worker:latest
    network_mode: host
    default_volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./services/gsd-worker/config:/app/config:ro
    environment:
      PYTHONPATH: /app/src

tasks:
  - id: daily_tick_sync_shard_1
    name: 盘后分笔采集与补采(Shard-1)
    type: workflow
    enabled: true
    schedule:
      type: trading_cron
      expression: "35 15 * * 1-5"
    workflow:
      - id: collect
        name: 分片采集
        command: ["jobs.sync_tick", "--scope", "all", "--shard-index", "1", "--shard-total", "3"]
      - id: retry
        name: 自动补采
        command: ["jobs.retry_tick", "--concurrency", "5"]
        depends_on: [collect]
    retry:
      max_attempts: 2
      backoff_seconds: 600

  # 定向个股数据补充 (NEW)
  - id: stock_data_supplement
    name: 定向个股数据补充
    type: docker
    enabled: false # 不自动调度，仅手动/API/Gate-3触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.supplement_stock"]
      environment:
        PYTHONPATH: "/app/src"
    retry:
      max_attempts: 2
      backoff_seconds: 300

  # 分笔按日补采
  - id: repair_tick
    name: 分笔数据补采
    type: docker
    enabled: false # 不自动调度，仅手动/API触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.sync_tick", "--scope", "all", "--distributed-source", "none"]
      environment:
        TICK_THRESHOLD: "95"
    retry:
      max_attempts: 1
