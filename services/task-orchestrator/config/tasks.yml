# Task Orchestrator 任务配置
# 版本: 1.0
# 时区: Asia/Shanghai

version: "1.0"
timezone: "Asia/Shanghai"

# 全局配置
global:
  docker:
    image: gsd-worker:latest
    network_mode: host
    default_volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./services/gsd-worker/config:/app/config:ro
      - ./services/gsd-worker/src:/app/src
    environment:
      PYTHONPATH: /app/src
  
  notifications:
    on_failure:
      - type: webhook
        url: "${ALERT_WEBHOOK_URL}"

# 任务列表
tasks:
  # ========== 数据同步任务 ==========
  
  # 每日股票代码采集 (P0)
  # 09:05 执行，从云端拉取并分片缓存
  - id: daily_stock_collection
    name: 每日股票代码采集
    type: docker
    enabled: true
    schedule:
      type: cron
      expression: "45 8 * * *" # 08:45 每日拉取
    target:
      command: ["jobs.daily_stock_collection"]
      network_mode: "host"
      environment:
        REDIS_HOST: "127.0.0.1"
        REDIS_PORT: "6379"
        REDIS_PASSWORD: "redis123"
        REDIS_CLUSTER: "false"
        HTTP_PROXY: "http://192.168.151.18:3128"
        CLOUD_API_URL: "http://124.221.80.250:8000/api/v1/stocks/all"
    retry:
      max_attempts: 3
      backoff_seconds: 300

  # K线每日同步 (P0)
  # 17:30 执行，单节点全量同步 (由于上游数据源限制，必须 17:30 后启动)
  - id: daily_kline_sync
    name: K线每日同步
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "30 17 * * *"
    target:
      command: ["jobs.sync_kline", "--mode", "adaptive"]
    retry:
      max_attempts: 2
      backoff_seconds: 600
  
  # 盘后分笔数据全量采集 (P1)
  # Node 41 禁用分笔同步 Cron，由 Node 58/111 执行分片采集
  - id: daily_tick_sync_shard_0
    name: 盘后分笔采集与补采(Shard-0)
    type: workflow
    enabled: false
    schedule:
      type: trading_cron
      expression: "0 18 * * 1-5"
    workflow:
      - id: collect
        name: 分片采集
        command: ["jobs.sync_tick", "--scope", "all", "--shard-index", "0", "--shard-total", "3"]
      - id: retry
        name: 自动补采
        command: ["jobs.retry_tick", "--concurrency", "50"]
        depends_on: [collect]
    retry:
      max_attempts: 2
      backoff_seconds: 600

  # 集群分片采集指令发射器 (P0) - 架构 3.0 核心
  # 取代各节点独立 Cron，由 Master 统一在 18:00 发出 3 个分片的采集指令
  - id: distributed_tick_sync
    name: 集群分笔分片采集指令
    type: command_emitter
    enabled: true
    schedule:
      type: trading_cron
      expression: "0 18 * * 1-5"
    target:
      task_template: "collect_tick_sharded"
      params:
        scope: "all"
        distributed_source: "none"
      shards: [0, 1, 2]
    retry:
      max_attempts: 1

  # 分笔数据每日归档 (P0)
  # 09:00 执行，将 intraday 数据整理到历史表并清空当日表
  - id: tick_data_migrate
    name: 分笔数据归档
    type: http
    enabled: true
    schedule:
      type: trading_cron
      expression: "0 9 * * 1-5" # 09:00 归档昨日数据
    target:
      # 直接调用 ClickHouse HTTP 接口执行迁移逻辑
      url: "http://127.0.0.1:8123/?multiquery=true"
      method: POST
      body: |
        -- 1. 将分布式当日表的数据灌入分布式历史表
        INSERT INTO stock_data.tick_data SELECT * FROM stock_data.tick_data_intraday;
        -- 2. 清空当日分布式表 (所有节点同步清空)
        TRUNCATE TABLE stock_data.tick_data_intraday;
      timeout_seconds: 300
    retry:
      max_attempts: 3
      backoff_seconds: 60

  
  # K线每日同步 - 云端分片模式 (未来腾讯云部署使用)
  # 4个分片并行，调用 Baostock 获取数据
  # - id: daily_kline_sync_cloud
  #   name: K线每日同步(云端)
  #   type: workflow
  #   enabled: false
  #   schedule:
  #     type: trading_cron
  #     expression: "5 15 * * 1-5"
  #   workflow:
  #     - id: sync-shards
  #       parallel: true
  #       tasks:
  #         - id: sync-0
  #           command: ["jobs.sync_kline", "--shard", "0", "--total", "4"]
  #         - id: sync-1
  #           command: ["jobs.sync_kline", "--shard", "1", "--total", "4"]
  #         - id: sync-2
  #           command: ["jobs.sync_kline", "--shard", "2", "--total", "4"]
  #         - id: sync-3
  #           command: ["jobs.sync_kline", "--shard", "3", "--total", "4"]
  #     - id: quality-check
  #       command: ["jobs.quality_check", "--deep", "--batch", "100"]
  #       depends_on: [sync-shards]
  #     - id: data-repair
  #       command: ["jobs.data_repair", "--limit", "20"]
  #       depends_on: [quality-check]
  #   retry:
  #     max_attempts: 2
  #     backoff_seconds: 600

  
  # 财务数据更新 (P1)
  - id: weekly_financial_sync
    name: 财务数据更新
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 6 * * 6"  # 周六 06:00
    target:
      command: ["jobs.sync_financial"]
    retry:
      max_attempts: 3
  
  # 估值数据更新 (P2)
  - id: monthly_valuation_sync
    name: 估值数据更新
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 6 1 * *"  # 每月1号 06:00
    target:
      command: ["jobs.sync_valuation"]
    retry:
      max_attempts: 2
  
  # ========== 策略任务 ==========
  
  # 每日策略扫描 (P1)
  - id: daily_strategy_scan
    name: 每日策略扫描
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "30 20 * * 1-5"  # 20:30 (必须在数据完整性校验后执行)
    target:
      image: quant-strategy:latest
      command: ["jobs.daily_scan"]
    dependencies:
      - post_market_gate
    retry:
      max_attempts: 2
      backoff_seconds: 300
  
  # 周末策略回测 (P2)
  - id: weekly_backtest
    name: 周末策略回测
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 8 * * 0"  # 周日 08:00
    target:
      image: quant-strategy:latest
      command: ["jobs.weekly_backtest"]
    retry:
      max_attempts: 1
  
  # ========== 系统维护任务 ==========
  
  # ... (Implicit match skipping to gate)

  # 盘后数据质量大检查 (P0) - 深度审计与收盘对账
  # 19:00 执行，在数据同步完成后立即进行质量核查与修复
  - id: post_market_gate
    name: 盘后数据质量门禁 (Gate-3)
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "0 19 * * 1-5"  # 19:00 交易日
    target:
      command: ["jobs.post_market_gate"]
      environment:
        KLINE_THRESHOLD: "98"
        TICK_THRESHOLD: "95"
    dependencies:
      - daily_kline_sync
    retry:
      max_attempts: 1


  # 每周深度审计 (P0) - 全量聚合校验 & 自动修复
  - id: weekly_deep_audit
    name: 每周深度审计
    type: docker
    enabled: false
    schedule:
      type: cron
      expression: "0 2 * * 0"  # 周日 02:00
    target:
      command: ["jobs.weekly_audit"]
    retry:
      max_attempts: 1

  # 月度数据审计 (P2)
  - id: monthly_audit
    name: 月度数据审计
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 3 5 * *"  # 每月5号 03:00
    target:
      command: ["jobs.data_audit"]
    retry:
      max_attempts: 1

  # ========== 补采/修复任务 (供 CommandPoller 调用) ==========
  
  # K线按日补采
  - id: repair_kline
    name: K线数据补采
    type: docker
    enabled: false # 不自动调度，仅手动/API触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.sync_kline"]
      environment:
        KLINE_THRESHOLD: "98"
    retry:
      max_attempts: 1

  # 分笔按日补采
  - id: repair_tick
    name: 分笔数据补采
    type: docker
    enabled: false # 不自动调度，仅手动/API触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.sync_tick", "--scope", "all", "--distributed-source", "none"]
      environment:
        TICK_THRESHOLD: "95"
    retry:
      max_attempts: 1

  # 分笔指定日期分片采集 (用于分布式精准调度)
  - id: collect_tick_sharded
    name: 分笔数据指定日期分片采集
    type: docker
    enabled: false
    schedule: 
      type: cron
      expression: "0 0 1 1 *"
    target:
      command: ["jobs.sync_tick", "--scope", "all"]
      environment:
        TICK_THRESHOLD: "95"
    retry:
      max_attempts: 1

  # 定向个股数据补充 (NEW)
  - id: stock_data_supplement
    name: 定向个股数据补充
    type: docker
    enabled: false # 不自动调度，仅手动/API/Gate-3触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.supplement_stock"]
      # 命令行参数通过 task_commands.params 动态传入
      # 例如: {"stocks": ["000001"], "data_types": ["tick", "financial"], "date": "20260115"}
      environment:
        PYTHONPATH: "/app/src"
    retry:
      max_attempts: 2
      backoff_seconds: 300

  # 远程校验触发器 (Validation Trigger)
  - id: trigger_validation
    name: 远程触发数据校验
    type: docker
    enabled: false # 不自动调度，仅手动/API触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.trigger_validation"]
      # 接受参数: --date YYYY-MM-DD
      environment:
        PYTHONPATH: "/app/src"
        STRICT_MODE: "true"
    retry:
      max_attempts: 1
