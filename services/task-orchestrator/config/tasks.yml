# Task Orchestrator 任务配置
# 版本: 1.0
# 时区: Asia/Shanghai

version: "1.0"
timezone: "Asia/Shanghai"

# 全局配置
global:
  docker:
    image: gsd-worker:latest
    network_mode: host
    default_volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./libs/gsd-agent/src:/app/libs/gsd-agent:ro
      - ./services/gsd-worker/config:/app/config:ro
      - ./services/gsd-worker/src:/app/src
    environment:
      PYTHONPATH: /app/src:/app/libs/gsd-shared:/app/libs/gsd-agent
  
  notifications:
    on_failure:
      - type: webhook
        url: "${ALERT_WEBHOOK_URL}"

# 任务列表
tasks:
  # ========== 数据同步任务 ==========
  
  # 每日股票代码采集 (P0)
  # 09:05 执行，从云端拉取并分片缓存
  - id: daily_stock_collection
    name: 每日股票代码采集 (Workflow Managed)
    type: docker
    target:
      command: ["jobs.daily_stock_collection"]
      network_mode: "host"
      environment:
        REDIS_HOST: "127.0.0.1"
        REDIS_PORT: "6379"
        REDIS_PASSWORD: "redis123"
        REDIS_CLUSTER: "false"
        HTTP_PROXY: "http://192.168.151.18:3128"
        CLOUD_API_URL: "http://124.221.80.250:8000/api/v1/stocks/all"
    retry:
      max_attempts: 3
      backoff_seconds: 300

  # 盘前数据门禁 (Gate-1)
  - id: pre_market_gate
    name: 盘前数据门禁 (Workflow Managed)
    type: docker
    target:
      command: ["jobs.pre_market_gate"]
      environment:
        STRICT_MODE: "true"
    retry:
      max_attempts: 2
      backoff_seconds: 60

  # K线每日同步 (P0)
  # 17:30 执行，单节点全量同步 (由于上游数据源限制，必须 17:30 后启动)
  - id: daily_kline_sync
    name: K线每日同步
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "30 17 * * *"
    target:
      command: ["jobs.sync_kline", "--mode", "adaptive"]
    retry:
      max_attempts: 2
      backoff_seconds: 600
  
  # 盘后分笔数据全量采集 (P1)
  # 单节点高并发采集 (Server 41) - 写入分布式表
  - id: daily_tick_sync_standalone
    name: 盘后分笔全量采集 (Standalone)
    type: workflow
    enabled: true
    schedule:
      type: trading_cron
      expression: "0 18 * * 1-5"
    target:
      environment:
        CLICKHOUSE_USE_DISTRIBUTED: "true"
        CLICKHOUSE_POOL_SIZE: "60"
    workflow:
      - id: collect
        name: 全量采集
        command: ["jobs.sync_tick", "--scope", "all", "--concurrency", "60"]
      - id: retry
        name: 自动补采
        command: ["jobs.retry_tick", "--concurrency", "60"]
        depends_on: [collect]
    retry:
      max_attempts: 2
      backoff_seconds: 600

  # 集群分片采集指令发射器 (P0) - 架构 3.0 核心 (Deprecated)
  # 已停用，改用单机高并发采集
  - id: distributed_tick_sync
    name: 集群分笔分片采集指令
    type: command_emitter
    enabled: false
    schedule:
      type: trading_cron
      expression: "0 18 * * 1-5"
    target:
      task_template: "collect_tick_sharded"
      params:
        scope: "all"
        distributed_source: "none"
      shards: [0, 1, 2]
    retry:
      max_attempts: 1

  # 盘中分笔午休校验与补采 (P1)
  # 11:35 执行，检查上午采集覆盖率并补采缺失股票
  - id: intraday_tick_validation_noon
    name: 盘中分笔午休校验与补采
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "35 11 * * 1-5"
    target:
      image: gsd-worker:latest
      command: ["jobs.intraday_tick_validation", "--session", "noon"]
      network_mode: "host"
    retry:
      max_attempts: 1

  # 盘中分笔盘后校验与补采 (P0)
  # 15:05 执行，检查全天采集覆盖率并补采缺失股票
  - id: intraday_tick_validation_close
    name: 盘中分笔盘后校验与补采
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "5 15 * * 1-5"
    target:
      image: gsd-worker:latest
      command: ["jobs.intraday_tick_validation", "--session", "close"]
      network_mode: "host"
    retry:
      max_attempts: 1

  # 分笔数据每日归档 (P0)
  # 已整合进 pre_market_prep_4.0 工作流，独立调度已禁用
  - id: tick_data_migrate
    name: 分笔数据归档
    type: docker
    enabled: true
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.tick_data_migration"]
    retry:
      max_attempts: 3
      backoff_seconds: 60
  
  # 财务数据更新 (P1)
  - id: weekly_financial_sync
    name: 财务数据更新
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 6 * * 6"  # 周六 06:00
    target:
      command: ["jobs.sync_financial"]
    retry:
      max_attempts: 3
  
  # 估值数据更新 (P2)
  - id: monthly_valuation_sync
    name: 估值数据更新
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 6 1 * *"  # 每月1号 06:00
    target:
      command: ["jobs.sync_valuation"]
    retry:
      max_attempts: 2
  
  # ========== 策略任务 ==========
  
  # 每日策略扫描 (P1)
  # 改为由 post_market_audit 工作流驱动，禁用独立调度
  - id: daily_strategy_scan
    name: 每日策略扫描
    type: docker
    enabled: true
    schedule:
      type: cron
      expression: "0 0 1 1 *" # 被工作流取代，设为 Dummy Schedule
    target:
      image: quant-strategy:dev
      command: ["jobs.daily_scan"]
    dependencies:
      - calculate_data_quality
    retry:
      max_attempts: 2
      backoff_seconds: 300
  
  # 周末策略回测 (P2)
  - id: weekly_backtest
    name: 周末策略回测
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 8 * * 0"  # 周日 08:00
    target:
      image: quant-strategy:latest
      command: ["jobs.weekly_backtest"]
    retry:
      max_attempts: 1
  
  # ========== 系统维护任务 ==========
  
  # 盘后数据质量大检查 (P0) - 深度审计与收盘对账
  # 19:00 执行，在数据同步完成后立即进行质量核查与修复
  # 已被新架构取代，改为从属于 workflow，禁用独立调度
  - id: post_market_gate
    name: 盘后数据质量门禁 (Gate-3)
    type: docker
    enabled: true
    schedule:
      type: cron
      expression: "0 0 1 1 *" # 被工作流取代，设为 Dummy Schedule
    target:
      command: ["jobs.post_market_gate"]
      environment:
        KLINE_THRESHOLD: "98"
        TICK_THRESHOLD: "95"
    dependencies:
      - daily_kline_sync
    retry:
      max_attempts: 1

  # 每周深度审计 (P0) - 全量聚合校验 & 自动修复
  - id: weekly_deep_audit
    name: 每周深度审计
    type: docker
    enabled: false
    schedule:
      type: cron
      expression: "0 2 * * 0"  # 周日 02:00
    target:
      command: ["jobs.weekly_audit"]
    retry:
      max_attempts: 1

  # 月度数据审计 (P2)
  - id: monthly_audit
    name: 月度数据审计
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 3 5 * *"  # 每月5号 03:00
    target:
      command: ["jobs.data_audit"]
    retry:
      max_attempts: 1

  # ========== 补采/修复任务 (供 CommandPoller 调用) ==========
  
  # K线按日补采
  - id: repair_kline
    name: K线数据补采
    type: docker
    enabled: false # 不自动调度，仅手动/API触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.sync_kline"]
      environment:
        KLINE_THRESHOLD: "98"
    retry:
      max_attempts: 1

  # 分笔按日补采
  - id: repair_tick
    name: 分笔数据补采
    type: docker
    enabled: false # 不自动调度，仅手动/API触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.sync_tick", "--scope", "all", "--distributed-source", "none"]
      network_mode: "host"
      environment:
        TICK_THRESHOLD: "95"
    retry:
      max_attempts: 1

  # 分笔指定日期分片采集 (用于分布式精准调度)
  - id: collect_tick_sharded
    name: 分笔数据指定日期分片采集
    type: docker
    enabled: false
    schedule: 
      type: cron
      expression: "0 0 1 1 *"
    target:
      command: ["jobs.sync_tick", "--scope", "all"]
      network_mode: "host"
      environment:
        TICK_THRESHOLD: "95"
    retry:
      max_attempts: 1

  # 定向个股数据补充 (NEW)
  - id: stock_data_supplement
    name: 定向个股数据补充
    type: docker
    enabled: false # 不自动调度，仅手动/API/Gate-3触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.supplement_stock"]
      environment:
        PYTHONPATH: "/app/src:/app/libs/gsd-shared:/app/libs/gsd-agent"
    retry:
      max_attempts: 2
      backoff_seconds: 300

  # [NEW] 1. K线就绪探测 (Barrier)
  - id: wait_for_kline
    name: K线就绪探测
    type: docker
    enabled: true
    target:
      command: ["jobs.wait_for_kline"]

  # [NEW] 2. 计算数据质量 (Audit & Purge)
  - id: calculate_data_quality
    name: 计算数据质量 (L1-L3 Audit)
    type: docker
    enabled: true
    target:
      command: ["jobs.audit_tick_resilience"]
      environment:
        PYTHONPATH: "/app/src:/app/libs/gsd-shared"

  # [NEW] 2. AI 质量门禁
  - id: ai_quality_gatekeeper
    name: AI 质量门禁
    type: docker
    enabled: false
    target:
      command: ["jobs.ai_quality_gatekeeper"]
      network_mode: host
      environment:
        PYTHONPATH: "/app/src:/app/libs/gsd-shared:/app/libs/gsd-agent"
        SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY}" # 需确保 Worker 能获取到

  # 远程校验触发器 (Validation Trigger)
  - id: trigger_validation
    name: 远程触发数据校验
    type: docker
    enabled: false # 不自动调度，仅手动/API触发
    schedule:
      type: cron
      expression: "0 0 1 1 *" # Dummy schedule
    target:
      command: ["jobs.trigger_validation"]
      environment:
        PYTHONPATH: "/app/src"
        STRICT_MODE: "true"
      max_attempts: 1

  # ==========================================
  # Workflow Triggers (Agentic 4.0)
  # ==========================================

  # 盘前准备管线触发器 (08:45)
  - id: trigger_pre_market_workflow
    name: 触发盘前 4.0 准备管线
    type: workflow_trigger
    enabled: true
    schedule:
      type: trading_cron
      expression: "45 8 * * 1-5"
    target:
      workflow_id: "pre_market_prep_4.0"
      initial_context:
        target_date: "{{today_nodash}}"
    retry:
      max_attempts: 1

  # 盘后同步管线触发器 (17:30)
  - id: trigger_post_market_workflow
    name: 触发盘后 4.0 自愈管线
    type: workflow_trigger
    enabled: true
    schedule:
      type: trading_cron
      expression: "30 15 * * 1-5"
    target:
      # 替换为新的 Workflow
      workflow_id: "post_market_audit"
      initial_context:
        target_date: "{{today_nodash}}"
    retry:
      max_attempts: 1

  # ==========================================
  # 历史治理专项触发器
  # ==========================================

  # 历史分笔治理管线触发器 (专供手动/前端调用)
  - id: trigger_historical_recovery
    name: 触发历史分笔专项治理管线
    type: workflow_trigger
    enabled: true
    target:
      workflow_id: "historical_tick_recovery"
      initial_context:
        trigger_source: "manual_adhoc"
    retry:
      max_attempts: 1
