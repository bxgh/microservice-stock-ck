# Task Orchestrator 任务配置
# 版本: 1.0
# 时区: Asia/Shanghai

version: "1.0"
timezone: "Asia/Shanghai"

# 全局配置
global:
  docker:
    image: gsd-worker:latest
    network_mode: host
    default_volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
    environment:
      PYTHONPATH: /app/src
  
  notifications:
    on_failure:
      - type: webhook
        url: "${ALERT_WEBHOOK_URL}"

# 任务列表
tasks:
  # ========== 数据同步任务 ==========
  
  # K线每日同步 - 本地模式 (P0)
  # 本地单进程执行，调用 Mootdx 获取数据
  - id: daily_kline_sync
    name: K线每日同步
    type: docker
    enabled: false
    schedule:
      type: trading_cron
      expression: "5 15 * * 1-5"
    target:
      command: ["jobs.sync_kline"]  # 无分片参数，顺序执行
    retry:
      max_attempts: 2
      backoff_seconds: 600
  
  # K线每日同步 - 云端分片模式 (未来腾讯云部署使用)
  # 4个分片并行，调用 Baostock 获取数据
  # - id: daily_kline_sync_cloud
  #   name: K线每日同步(云端)
  #   type: workflow
  #   enabled: false
  #   schedule:
  #     type: trading_cron
  #     expression: "5 15 * * 1-5"
  #   workflow:
  #     - id: sync-shards
  #       parallel: true
  #       tasks:
  #         - id: sync-0
  #           command: ["jobs.sync_kline", "--shard", "0", "--total", "4"]
  #         - id: sync-1
  #           command: ["jobs.sync_kline", "--shard", "1", "--total", "4"]
  #         - id: sync-2
  #           command: ["jobs.sync_kline", "--shard", "2", "--total", "4"]
  #         - id: sync-3
  #           command: ["jobs.sync_kline", "--shard", "3", "--total", "4"]
  #     - id: quality-check
  #       command: ["jobs.quality_check", "--deep", "--batch", "100"]
  #       depends_on: [sync-shards]
  #     - id: data-repair
  #       command: ["jobs.data_repair", "--limit", "20"]
  #       depends_on: [quality-check]
  #   retry:
  #     max_attempts: 2
  #     backoff_seconds: 600

  
  # 财务数据更新 (P1)
  - id: weekly_financial_sync
    name: 财务数据更新
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 6 * * 6"  # 周六 06:00
    target:
      command: ["jobs.sync_financial"]
    retry:
      max_attempts: 3
  
  # 估值数据更新 (P2)
  - id: monthly_valuation_sync
    name: 估值数据更新
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 6 1 * *"  # 每月1号 06:00
    target:
      command: ["jobs.sync_valuation"]
    retry:
      max_attempts: 2
  
  # ========== 策略任务 ==========
  
  # 每日策略扫描 (P1)
  - id: daily_strategy_scan
    name: 每日策略扫描
    type: docker
    enabled: true
    schedule:
      type: trading_cron
      expression: "30 18 * * 1-5"  # 18:30 交易日
    target:
      image: quant-strategy:latest
      command: ["jobs.daily_scan"]
    dependencies:
      - daily_kline_sync
    retry:
      max_attempts: 2
      backoff_seconds: 300
  
  # 周末策略回测 (P2)
  - id: weekly_backtest
    name: 周末策略回测
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 8 * * 0"  # 周日 08:00
    target:
      image: quant-strategy:latest
      command: ["jobs.weekly_backtest"]
    retry:
      max_attempts: 1
  
  # ========== 系统维护任务 ==========
  
  # 数据库备份 (P0)
  - id: daily_db_backup
    name: 数据库备份
    type: docker
    enabled: true
    schedule:
      type: cron
      expression: "0 3 * * *"  # 每日 03:00
    target:
      command: ["jobs.db_backup"]
    retry:
      max_attempts: 3
      backoff_seconds: 120
  
  # 缓存预热 (P1)
  - id: daily_cache_warmup
    name: 缓存预热
    type: http
    enabled: true
    schedule:
      type: trading_cron
      expression: "0 9 * * 1-5"  # 09:00 交易日
    target:
      service: gsd-api
      endpoint: /api/v1/internal/warmup
      method: POST
      timeout_seconds: 60
    retry:
      max_attempts: 2
  
  # 日志清理 (P2)
  - id: weekly_log_cleanup
    name: 日志清理
    type: docker
    enabled: true
    schedule:
      type: cron
      expression: "0 2 * * 0"  # 周日 02:00
    target:
      command: ["jobs.log_cleanup", "--days", "30"]
    retry:
      max_attempts: 1
  
  # ClickHouse 系统日志清理 (P1)
  - id: weekly_clickhouse_log_cleanup
    name: ClickHouse日志清理
    type: http
    enabled: true
    schedule:
      type: cron
      expression: "0 3 * * 0"  # 周日 03:00
    target:
      # 通过添加 multiquery=true 参数支持多语句执行
      url: "http://127.0.0.1:8123/?multiquery=true"
      method: POST
      body: |
        ALTER TABLE system.trace_log DELETE WHERE event_date < today() - 7;
        ALTER TABLE system.text_log DELETE WHERE event_date < today() - 7;
        ALTER TABLE system.query_log DELETE WHERE event_date < today() - 14;
        ALTER TABLE system.metric_log DELETE WHERE event_date < today() - 7;
        ALTER TABLE system.asynchronous_metric_log DELETE WHERE event_date < today() - 7;
      timeout_seconds: 300
    retry:
      max_attempts: 2
      backoff_seconds: 60
  
  # ========== 数据质量任务 ==========

  # 每周深度审计 (P0) - 全量聚合校验 & 自动修复
  - id: weekly_deep_audit
    name: 每周深度审计
    type: docker
    enabled: false
    schedule:
      type: cron
      expression: "0 2 * * 0"  # 周日 02:00
    target:
      command: ["jobs.weekly_audit"]
    retry:
      max_attempts: 1

  # 月度数据审计 (P2)
  - id: monthly_audit
    name: 月度数据审计
    type: docker
    enabled: false  # 待实现
    schedule:
      type: cron
      expression: "0 3 5 * *"  # 每月5号 03:00
    target:
      command: ["jobs.data_audit"]
    retry:
      max_attempts: 1
