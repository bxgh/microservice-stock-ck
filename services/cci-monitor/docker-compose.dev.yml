services:
  cci-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENABLE_PROXY=true
        - PROXY_URL=http://192.168.151.18:3128
    container_name: cci-monitor-dev
    restart: unless-stopped
    
    # 网络模式: host (用于访问宿主机的 MySQL 隧道和 Nacos)
    network_mode: host
    
    environment:
      - CCI_ENV=dev
      - CCI_DEBUG=true
      - CCI_LOG_LEVEL=DEBUG
      - CCI_PORT=8085
      
      # MySQL 配置 (指向 36301 隧道)
      - CCI_DB_HOST=127.0.0.1
      - CCI_DB_PORT=36301
      - CCI_DB_USER=root
      - CCI_DB_PASSWORD=alwaysup@888
      - CCI_DB_NAME=alwaysup
      
      # 数据源与注册中心
      - CCI_GSD_API_URL=http://127.0.0.1:8083
      - CCI_NACOS_SERVER_URL=http://127.0.0.1:8848
      - CCI_ENABLE_NACOS=false
      
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8085
      --reload
      --reload-dir /app/src
    
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
