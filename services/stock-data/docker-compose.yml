version: '3.8'

services:
  stock-data:
    image: stock-data:template
    container_name: stock-data
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - NACOS_SERVER_URL=http://nacos:8848
      - SERVICE_NAME=stock-data
      - SERVICE_GROUP=DEFAULT_GROUP
      - SERVICE_PORT=8082
      - LOG_LEVEL=INFO
      - HEARTBEAT_INTERVAL=30
    networks:
      - microservice-stock_microservice-stock
    volumes:
      - stock-data-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--noproxy", "*", "-f", "http://localhost:8082/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  microservice-stock_microservice-stock:
    external: true

volumes:
  stock-data-logs:
    driver: local