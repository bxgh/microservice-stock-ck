version: "2.0.0"
updated_at: "2025-12-02T10:55:00+08:00"
updated_by: "AI System Architect"

# ==================== 全局设置 ====================
global:
  default_acquisition_interval: 3  # 默认采集间隔（秒）
  max_pool_size: 1000             # 股票池最大容量
  enable_auto_update: true         # 启用自动更新

# ==================== 活跃模式选择 ====================
# 可选值: "hs300_top100" | "hot_sectors" | "custom"
active_mode: "hs300_top100"

# ==================== 模式1: 沪深300 Top 100 ====================
hs300_top100:
  enabled: true
  size: 100
  source: "akshare"
  acquisition_interval: 3
  update_schedule: "0 8 * * *"  # 每天8点更新（Cron表达式）
  volume_lookback_days: 5        # 成交额回看天数

# ==================== 模式2: 热门赛道（未实施）====================
hot_sectors:
  enabled: false
  sectors:
    tech:
      name: "科技芯片"
      size: 20
      sources:
        - type: "etf"
          code: "512760"  # 芯片ETF
          top_n: 10
        - type: "etf"
          code: "512480"  # 半导体ETF
          top_n: 10
      filters:
        min_avg_amount: 1000000000  # 10亿

    new_energy:
      name: "新能源 & 电动车"
      size: 20
      sources:
        - type: "etf"
          code: "159806"  # 新能源车ETF
          top_n: 12
        - type: "etf"
          code: "515790"  # 光伏ETF
          top_n: 8

    healthcare:
      name: "医药生物"
      size: 20
      sources:
        - type: "etf"
          code: "512290"  # 生物医药ETF
          top_n: 15
        - type: "manual"
          codes: ["300760", "688981", "603259", "002821", "300015"]

    consumer:
      name: "消费白酒"
      size: 15
      sources:
        - type: "etf"
          code: "512690"  # 白酒ETF
          top_n: 10
        - type: "manual"
          codes: ["600519", "000858", "000568", "002304", "603369"]

    finance:
      name: "金融周期"
      size: 15
      sources:
        - type: "etf"
          code: "512000"  # 券商ETF
          top_n: 5
        - type: "etf"
          code: "512800"  # 银行ETF
          top_n: 5
        - type: "etf"
          code: "512400"  # 有色金属ETF
          top_n: 5

    monster:
      name: "超级妖股"
      size: 10
      dynamic: false    # Switch to manual mode
      update_frequency: "weekly"
      sources:
        - type: "manual"
          codes: 
            - "300059"  # 东方财富
            - "601138"  # 工业富联
            - "600418"  # 江淮汽车
            - "000063"  # 中兴通讯
            - "002230"  # 科大讯飞
            - "603019"  # 中科曙光
            - "300308"  # 中际旭创
            - "002371"  # 北方华创
            - "600150"  # 中国船舶
            - "601360"  # 三六零
            
      # Criteria kept for reference/future use
      criteria:
        - field: "涨跌幅"
          operator: ">"
          value: 9.0
        - field: "换手率"
          operator: ">"
          value: 10.0
        - field: "流通市值"
          operator: "<"
          value: 50000000000  # 500亿

# ==================== 模式3: 自定义配置 ====================
custom:
  enabled: false
  groups:
    - name: "我的策略池"
      codes: ["600519", "000858", "000001", "601398", "601318"]
      acquisition_interval: 3
      
    - name: "实验池"
      codes: ["688981", "603259"]
      acquisition_interval: 5

# ==================== 黑名单过滤 ====================
blacklist:
  enabled: true
  
  # 模式匹配（支持通配符 *）
  patterns:
    - "ST*"         # ST股票
    - "*ST*"        # 各种ST变体
    - "退*"         # 退市股
    - "暂停*"       # 暂停上市
    - "*退市*"      # 包含退市字样
  
  # 手动指定代码（直接黑名单）
  codes: []
    # - "600000"    # 示例：手动添加
  
  # 规则过滤（高级）
  rules:
    - field: "流通市值"
      operator: "<"
      value: 100000000    # 过滤小于1亿市值的超小盘股
      
    - field: "成交额"
      operator: "<"
      value: 10000000     # 过滤成交额小于1000万的无流动性股票

# ==================== 白名单（优先级高于黑名单）====================
whitelist:
  enabled: false
  codes: []
    # - "600519"    # 贵州茅台（示例：即使名字含ST也保留）

# ==================== 行业分组（用于分析，可选）====================
industry_groups:
  金融:
    - "600000"  # 浦发银行
    - "600036"  # 招商银行
    - "601398"  # 工商银行
    - "601318"  # 中国平安
    
  科技:
    - "688981"  # 中芯国际
    - "603986"  # 兆易创新
    - "000063"  # 中兴通讯
    
  消费:
    - "600519"  # 贵州茅台
    - "000858"  # 五粮液
    - "600887"  # 伊利股份
    
  医药:
    - "600276"  # 恒瑞医药
    - "000661"  # 长春高新
    - "300760"  # 迈瑞医疗

# ==================== 审计日志配置 ====================
audit:
  enabled: true
  log_file: "logs/config_changes.log"
  retention_days: 30
