services:
  get-stockdata:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENABLE_PROXY=true  # 构建时使用代理+国内源加速
        - PROXY_URL=http://192.168.151.18:3128
    image: get-stockdata:${VERSION:-latest}
    container_name: get-stockdata-api-dev
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-8003}:8083"
    environment:
      - NACOS_SERVER_URL=${NACOS_SERVER_URL:-http://127.0.0.1:8848}
      - SERVICE_NAME=get-stockdata
      - SERVICE_GROUP=DEFAULT_GROUP
      - SERVICE_PORT=8083
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - HEARTBEAT_INTERVAL=30
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      - PROXY_URL=http://192.168.151.18:3128  # 唯一正确的云代理
      - AKSHARE_API_URL=http://124.221.80.250:8003 # 腾讯云远程 AkShare API (8003)
      - STOCK_DICT_API_URL=http://124.221.80.250:8000 # 腾讯云股票字典 (8000)
      - ENABLE_PROXY_CHAINS=false # 禁用代理链，使用 aiohttp 原生代理处理 HTTP 请求
      # 代理由 entrypoint.sh 配置
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-microservice-stock-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-9000}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-stock_data}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-admin123}
      # MySQL Config (From .env)
      - GSD_DATABASE_TYPE=${GSD_DATABASE_TYPE:-mysql}
      - GSD_DB_HOST=${GSD_DB_HOST}
      - GSD_DB_PORT=${GSD_DB_PORT}
      - GSD_DB_NAME=${GSD_DB_NAME}
      - GSD_DB_USER=${GSD_DB_USER}
      - GSD_DB_PASSWORD=${GSD_DB_PASSWORD}
      # Redis Config (host network mode, so use localhost)
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - REDIS_DB=${REDIS_DB:-0}
    # 🔥 开发模式启动命令 - 启用热加载
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8083
      --reload
      --reload-dir /app/src
      --log-level debug
    network_mode: host
    volumes:
      # ✅ 源码热加载 - 读写模式
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests  # ✅ 挂载测试代码（方便容器内测试）
      - ./scripts:/app/scripts # ✅ 挂载脚本目录
      - ./entrypoint.sh:/app/entrypoint.sh # ✅ 挂载启动脚本(Force update)
      - get-stockdata-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--noproxy", "*", "-f", "http://localhost:8083/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  microservice-stock:
    external: true
    name: microservice-stock_microservice-stock

volumes:
  get-stockdata-logs:
    driver: local
