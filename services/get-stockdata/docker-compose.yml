version: '3.8'

services:
  get-stockdata:
    image: get-stockdata:latest
    container_name: get-stockdata
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - NACOS_SERVER_URL=http://nacos:8848
      - SERVICE_NAME=get-stockdata
      - SERVICE_GROUP=DEFAULT_GROUP
      - SERVICE_PORT=8086
      - LOG_LEVEL=INFO
      - HEARTBEAT_INTERVAL=30
    networks:
      - microservice-stock_microservice-stock
    volumes:
      - get-stockdata-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--noproxy", "*", "-f", "http://localhost:8086/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  microservice-stock_microservice-stock:
    external: true

volumes:
  get-stockdata-logs:
    driver: local