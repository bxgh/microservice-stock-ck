services:
  get-stockdata:
    build:
      context: .
      dockerfile: Dockerfile
    image: get-stockdata:${VERSION:-latest}
    container_name: get-stockdata-api
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-8086}:8083"  # 外部端口:内部端口
    environment:
      - NACOS_SERVER_URL=${NACOS_SERVER_URL:-http://nacos:8848}
      - SERVICE_NAME=get-stockdata
      - SERVICE_GROUP=DEFAULT_GROUP
      - SERVICE_PORT=8083
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HEARTBEAT_INTERVAL=30
      - ENVIRONMENT=production
      - HTTP_PROXY=http://192.168.151.18:3128
      - HTTPS_PROXY=http://192.168.151.18:3128
      - AKSHARE_API_URL=http://124.221.80.250:8000
    networks:
      - microservice-stock
    volumes:
      # 生产环境仅挂载日志目录
      - get-stockdata-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--noproxy", "*", "-f", "http://localhost:8083/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  microservice-stock:
    external: true

volumes:
  get-stockdata-logs:
    driver: local