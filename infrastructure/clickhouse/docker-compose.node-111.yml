# =============================================================================
# ClickHouse Cluster - Server 111 部署配置
# =============================================================================
# 使用说明:
#   启动: docker-compose -f ~/microservice-stock-deploy/clickhouse/docker-compose.node-111.yml up -d
#   停止: docker-compose -f ~/microservice-stock-deploy/clickhouse/docker-compose.node-111.yml down
#   日志: docker-compose -f ~/microservice-stock-deploy/clickhouse/docker-compose.node-111.yml logs -f

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: microservice-stock-clickhouse
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # 数据卷
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      
      # 配置文件 (需从 Server 41 分发)
      - ./config/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./config/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./config/config.d/node_111.xml:/etc/clickhouse-server/config.d/node_111.xml:ro
    
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

# =============================================================================
# 部署说明
# =============================================================================
# 1. 首次部署时，配置文件需要从 Server 41 分发:
#    (在 Server 41 上执行)
#    scp -r infrastructure/clickhouse/config/ bxgh@192.168.151.111:~/microservice-stock-deploy/clickhouse/
#
# 2. 确保配置文件路径正确:
#    ~/microservice-stock-deploy/clickhouse/config/config.xml
#    ~/microservice-stock-deploy/clickhouse/config/users.xml
#    ~/microservice-stock-deploy/clickhouse/config/config.d/node_111.xml
#
# 3. 检查 Keeper 状态:
#    echo mntr | nc -w 2 127.0.0.1 9181
# =============================================================================
