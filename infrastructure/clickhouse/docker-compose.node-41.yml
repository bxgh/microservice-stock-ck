# =============================================================================
# ClickHouse Cluster - Server 41 部署配置
# =============================================================================
# 使用说明:
#   启动: docker-compose -f infrastructure/clickhouse/docker-compose.node-41.yml up -d
#   停止: docker-compose -f infrastructure/clickhouse/docker-compose.node-41.yml down
#   日志: docker-compose -f infrastructure/clickhouse/docker-compose.node-41.yml logs -f

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: microservice-stock-clickhouse
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # 数据卷
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      
      # 配置文件
      - ./config/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./config/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./config/config.d/node_41.xml:/etc/clickhouse-server/config.d/node_41.xml:ro
    
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

# =============================================================================
# 部署后验证
# =============================================================================
# 1. 检查 Keeper 状态:
#    echo mntr | nc -w 2 127.0.0.1 9181
#
# 2. 检查集群拓扑:
#    docker exec microservice-stock-clickhouse clickhouse-client --query \
#      "SELECT * FROM system.clusters WHERE cluster='stock_cluster'"
#
# 3. 检查复制状态:
#    docker exec microservice-stock-clickhouse clickhouse-client --query \
#      "SELECT * FROM system.replicas"
# =============================================================================
