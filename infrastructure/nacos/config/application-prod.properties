# Nacos 生产环境配置文件

# 服务器配置
server.servlet.contextPath=/nacos
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.port=8848

# 数据库配置（生产环境建议使用MySQL）
# 如果使用MySQL，请取消注释并配置
# spring.datasource.platform=mysql
# db.num=1
# db.url.0=jdbc:mysql://localhost:3306/nacos_config?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC
# db.user.0=nacos
# db.password.0=nacos
# db.pool.config.connectionTimeout=30000
# db.pool.config.maximumPoolSize=20
# db.pool.config.minimumIdle=2

# 单机模式配置
spring.datasource.platform=embedded
nacos.standalone=true

# 安全配置（生产环境启用）
nacos.core.auth.enabled=true
nacos.core.auth.default.token.secret.key=SecretKey012345678901234567890123456789012345678901234567890123456789
nacos.core.auth.system.type=nacos
nacos.core.auth.plugin.nacos.token.secret.key=SecretKey012345678901234567890123456789012345678901234567890123456789

# 日志配置
server.tomcat.basedir=
nacos.logs.path=${nacos.home}/logs
logging.config=${nacos.home}/conf/nacos-logback.xml
logging.level.root=INFO
logging.level.com.alibaba.nacos=INFO

# 性能配置（生产环境优化）
nacos.config.push-content.retryTime=3000
management.endpoints.web.exposure.include=*
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10

# 命名空间配置
nacos.naming.exposed.port=8848
nacos.naming.exposed.context=/nacos

# 配置中心配置
nacos.config.exposed.port=8848
nacos.config.exposed.context=/nacos

# 临时实例过期时间（毫秒）
nacos.naming.expiration.expire-time=15000

# 心跳检查间隔（毫秒）
nacos.naming.beat.heartbeat.period=5000

# 集群配置
nacos.core.auth.enabled=true