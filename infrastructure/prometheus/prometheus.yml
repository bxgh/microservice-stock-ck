# Prometheus Configuration for Get-StockData Microservice
# This file should be mounted to Prometheus container

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Stock Data Service
  - job_name: 'get-stockdata'
    static_configs:
      # Use host.docker.internal to reach services running with network_mode: host
      - targets: ['host.docker.internal:8083']
    scrape_interval: 5s
    metrics_path: /metrics
    
    # Optional: relabeling to add instance labels
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'get-stockdata-dev'
