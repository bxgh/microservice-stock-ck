version: '3.8'
services:
  redis-node-111:
    image: redis:7.2-alpine
    container_name: redis-cluster-node-111
    network_mode: host
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    restart: always
