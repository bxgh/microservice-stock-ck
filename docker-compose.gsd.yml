  #     - CLICKHOUSE_PASSWORD=
  #     - CLICKHOUSE_DATABASE=stock_data
  #     - CLICKHOUSE_POOL_SIZE=5
  #     
  #     # Redis 配置
  #     - REDIS_HOST=127.0.0.1
  #     - REDIS_PORT=6379
  #     - REDIS_PASSWORD=
  #     - REDIS_DB=1
