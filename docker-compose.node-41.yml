# =============================================================================
# Server 41 (主控节点) Docker Compose 配置
# =============================================================================
# 运行: docker-compose -f docker-compose.node-41.yml up -d
# 设计为: 主控 + 开发 + 监控

services:
  # ---------------------------------------------------------------------------
  # 核心服务 (必须运行)
  # ---------------------------------------------------------------------------
  
  mootdx-api:
    build:
      context: ./services/mootdx-api
      dockerfile: Dockerfile
    image: microservice-stock-mootdx-api:latest
    container_name: microservice-stock-mootdx-api
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8003
      - HOST=0.0.0.0
      - TDX_POOL_SIZE=5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs/mootdx-api:/app/logs

  mootdx-source:
    build:
      context: ./services/mootdx-source
      dockerfile: Dockerfile
    image: microservice-stock-mootdx-source:latest
    container_name: microservice-stock-mootdx-source
    network_mode: host
    restart: unless-stopped
    environment:
      - GRPC_PORT=50051
    volumes:
      - ./logs/mootdx-source:/app/logs

  # ---------------------------------------------------------------------------
  # 任务调度 (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  task-orchestrator:
    build:
      context: .
      dockerfile: services/task-orchestrator/Dockerfile
    image: task-orchestrator:latest
    container_name: task-orchestrator
    network_mode: host
    restart: unless-stopped
    environment:
      - ORCHESTRATOR_DEBUG=false
      - ORCHESTRATOR_DOCKER_HOST=unix:///var/run/docker.sock
      - ORCHESTRATOR_WORKER_IMAGE=gsd-worker:latest
      - ORCHESTRATOR_WORKER_NETWORK=host
      - ORCHESTRATOR_REDIS_HOST=127.0.0.1
      - ORCHESTRATOR_REDIS_PORT=6379
      - ORCHESTRATOR_REDIS_PASSWORD=redis123
      - WORKER_MYSQL_HOST=127.0.0.1
      - WORKER_MYSQL_PORT=36301
      - WORKER_CLICKHOUSE_HOST=127.0.0.1
      - WORKER_CLICKHOUSE_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/task-orchestrator:/app/logs
      - ./services/task-orchestrator/config/tasks.yml:/app/config/tasks.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 策略引擎 (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  quant-strategy:
    build:
      context: .
      dockerfile: services/quant-strategy/Dockerfile
    image: quant-strategy:dev
    container_name: quant-strategy-dev
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8084
      - CLICKHOUSE_HOST=127.0.0.1
      - CLICKHOUSE_PORT=9000
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
    volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/quant-strategy:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 数据 API (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  get-stockdata:
    build:
      context: .
      dockerfile: services/get-stockdata/Dockerfile
    image: get-stockdata:latest
    container_name: get-stockdata-api-dev
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8083
      - CLICKHOUSE_HOST=127.0.0.1
      - REDIS_HOST=127.0.0.1
      - MOOTDX_API_URL=http://127.0.0.1:8003
    volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/get-stockdata:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 支撑服务 (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  redis:
    image: redis:7.0-alpine
    container_name: microservice-stock-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: microservice-stock-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  # ---------------------------------------------------------------------------
  # 分片采集 Worker (按需运行)
  # ---------------------------------------------------------------------------
  # docker-compose -f docker-compose.node-41.yml run --rm gsd-worker python -m jobs.sync_tick
  
  gsd-worker:
    build:
      context: .
      dockerfile: services/gsd-worker/Dockerfile
    image: gsd-worker:latest
    network_mode: host
    environment:
      - SHARD_INDEX=0
      - SHARD_TOTAL=3
      - CLICKHOUSE_HOST=127.0.0.1
      - MOOTDX_API_URL=http://127.0.0.1:8003
    volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/gsd-worker:/app/logs

volumes:
  redis_data:
  prometheus_data:
