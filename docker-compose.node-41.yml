  #     - HTTP_PROXY=http://192.168.151.18:3128
  #     - HTTPS_PROXY=http://192.168.151.18:3128
  #     - PROXY_URL=http://192.168.151.18:3128
  #     - SNAPSHOT_STORAGE_PATH=/app/data/snapshots
  #     - PYTHONPATH=/app
  #     - PYTHONUNBUFFERED=1
  #   volumes:
  #     - ./libs/gsd-shared:/app/libs/gsd-shared:ro
  #     - ./logs/snapshot-recorder:/app/logs
  #     - ./data/snapshots:/app/data/snapshots
  #     - ./services/get-stockdata/src:/app/src
  #     - ./services/get-stockdata/config/hs300_stocks.yaml:/app/config/hs300_stocks.yaml:ro
  #   healthcheck:
  #     test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/logs/snapshot_recorder.log') or os.path.exists('/app/logs/snapshot-recorder/snapshot_recorder.log') else 1)"]
  #     interval: 60s
  #     timeout: 10s
  #     retries: 3

  # ---------------------------------------------------------------------------
  # 盘中分笔实时采集器 (NEW)
  # ---------------------------------------------------------------------------
  
  intraday-tick-collector:
    image: get-stockdata:latest
    container_name: intraday-tick-collector
    network_mode: host
    restart: unless-stopped
    command: python3 -m src.core.collector.intraday_tick_main
    environment:
      - CLICKHOUSE_HOST=127.0.0.1
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DB=stock_data
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=admin123
      - MOOTDX_API_URL=http://127.0.0.1:8003
      - STOCK_POOL_PATH=/app/config/hs300_stocks.yaml
      - CONCURRENCY=16
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/intraday-tick-collector:/app/logs
      - ./services/get-stockdata/src:/app/src
      - ./services/get-stockdata/tests:/app/tests:ro
      - ./services/get-stockdata/config/hs300_stocks.yaml:/app/config/hs300_stocks.yaml:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/logs/intraday_tick_collector.log') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 支撑服务 (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  redis:
    image: redis:7.0-alpine
    container_name: node-41-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: node-41-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  # ---------------------------------------------------------------------------
  # 分片采集 Worker (按需运行)
  # ---------------------------------------------------------------------------
  # docker-compose -f docker-compose.node-41.yml run --rm gsd-worker python -m jobs.sync_tick
  
  gsd-worker:
    build:
      context: .
      dockerfile: services/gsd-worker/Dockerfile
      args:
        - ENABLE_PROXY=true
        - PROXY_URL=http://192.168.151.18:3128
    image: gsd-worker:latest
    network_mode: host
    environment:
      - SHARD_INDEX=0
      - SHARD_TOTAL=3
      - CLICKHOUSE_HOST=127.0.0.1
      - MOOTDX_API_URL=http://localhost:8003
      # 网络代理配置
      - HTTP_PROXY=http://192.168.151.18:3128
      - HTTPS_PROXY=http://192.168.151.18:3128
      - REDIS_CLUSTER=false
      - NO_PROXY=localhost,127.0.0.1,192.168.151.41
      - ENVIRONMENT=development
      # MySQL 配置
      - GSD_DB_HOST=${GSD_DB_HOST:-127.0.0.1}
      - GSD_DB_PORT=${GSD_DB_PORT:-36301}
      - GSD_DB_NAME=${GSD_DB_NAME:-alwaysup}
      - GSD_DB_USER=${GSD_DB_USER:-root}
      - GSD_DB_PASSWORD=${GSD_DB_PASSWORD:-alwaysup@888}
      # ClickHouse 配置
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-127.0.0.1}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-9000}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-admin123}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-stock_data}
      # Redis 配置
      - REDIS_HOST=${REDIS_HOST:-127.0.0.1}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=redis123
      - REDIS_CLUSTER=${REDIS_CLUSTER:-false}
      - REDIS_DB=${REDIS_DB:-0}
    volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/gsd-worker:/app/logs
      - ./services/gsd-worker/src:/app/src
      - ./data/gsd-worker:/app/data

  # gsd-worker-consumer:
  #   image: gsd-worker:latest
  #   network_mode: host
  #   environment:
  #     - PYTHONPATH=/app:/app/libs/gsd-shared
  #     - CLICKHOUSE_HOST=127.0.0.1
  #     - REDIS_HOST=127.0.0.1
  #     - REDIS_PORT=6379
  #     - REDIS_PASSWORD=redis123
