# =============================================================================
# Server 41 (主控节点) Docker Compose 配置
# =============================================================================
# 运行: docker-compose -f docker-compose.node-41.yml up -d
# 设计为: 主控 + 开发 + 监控

services:
  # ---------------------------------------------------------------------------
  # 核心服务 (必须运行)
  # ---------------------------------------------------------------------------
  
  mootdx-api:
    build:
      context: .
      dockerfile: services/mootdx-api/Dockerfile
      args:
        - ENABLE_PROXY=true
        - PROXY_URL=http://192.168.151.18:3128
    image: microservice-stock-mootdx-api:latest
    container_name: microservice-stock-mootdx-api
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8003
      - HOST=0.0.0.0
      - TDX_POOL_SIZE=50
      - MOOTDX_CONCURRENCY=50
      - MOOTDX_FETCH_COUNT=5
      # - SOCKS_PROXY=127.0.0.1:8118
      
      # [Standardized Direct Connection Config]
      - TDX_AUTO_DISCOVER=false
      - TDX_BIND_IP=192.168.151.41
      - TDX_HOSTS=175.6.5.131:7709,175.6.5.136:7709,175.6.5.138:7709,175.6.5.144:7709,175.6.5.146:7709,175.6.5.150:7709,175.6.5.151:7709,175.6.5.153:7709,175.6.5.154:7709,175.6.5.155:7709,175.6.5.156:7709,175.6.5.157:7709,175.6.5.158:7709,139.9.133.247:7709,139.9.51.18:7709,139.159.239.163:7709
      - LOG_LEVEL=INFO
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - REDIS_CLUSTER=false
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs/mootdx-api:/app/logs
      - mootdx_config:/root/.mootdx
      - ./services/mootdx-api/src:/app/src  # 开发模式挂载源码
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro # 挂载共享库

  mootdx-source:
    build:
      context: .
      dockerfile: services/mootdx-source/Dockerfile
      args:
        - ENABLE_PROXY=true
        - PROXY_URL=http://192.168.151.18:3128
    image: microservice-stock-mootdx-source:latest
    container_name: microservice-stock-mootdx-source
    network_mode: host
    restart: unless-stopped
    environment:
      - SERVICE_NAME=mootdx-source
      - SERVICE_HOST=127.0.0.1
      - SERVICE_PORT=50051
      - NACOS_SERVER_ADDR=127.0.0.1:8848
      - LOG_LEVEL=INFO
      - MOOTDX_API_URL=http://127.0.0.1:8003
      # 网络代理配置
      - HTTP_PROXY=http://192.168.151.18:3128
      - HTTPS_PROXY=http://192.168.151.18:3128
      - NO_PROXY=localhost,127.0.0.1,0.0.0.0,::1
      # 云端 API URLs
      - AKSHARE_API_URL=http://124.221.80.250:8003
      - BAOSTOCK_API_URL=http://124.221.80.250:8001
      - PYWENCAI_API_URL=http://124.221.80.250:8002
    volumes:
      - ./logs/mootdx-source:/app/logs
      - ./services/mootdx-source/src:/app/src

  # ---------------------------------------------------------------------------
  # 任务调度 (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  task-orchestrator:
    build:
      context: .
      dockerfile: services/task-orchestrator/Dockerfile
      args:
        - ENABLE_PROXY=true
        - PROXY_URL=http://192.168.151.18:3128
    image: task-orchestrator:latest
    container_name: task-orchestrator
    network_mode: host
    restart: unless-stopped
    environment:
      - ORCHESTRATOR_DEBUG=false
      - ORCHESTRATOR_DOCKER_HOST=unix:///var/run/docker.sock
      - ORCHESTRATOR_WORKER_IMAGE=gsd-worker:latest
      - ORCHESTRATOR_WORKER_NETWORK=host
      - ORCHESTRATOR_REDIS_HOST=127.0.0.1
      - ORCHESTRATOR_REDIS_PORT=6379
      - ORCHESTRATOR_REDIS_PASSWORD=redis123
      - WORKER_MYSQL_HOST=127.0.0.1
      - WORKER_MYSQL_PORT=36301
      - WORKER_CLICKHOUSE_HOST=127.0.0.1
      - WORKER_CLICKHOUSE_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/task-orchestrator:/app/logs
      - ./services/task-orchestrator/config/tasks.yml:/app/config/tasks.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 策略引擎 (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  quant-strategy:
    build:
      context: ./services/quant-strategy
      dockerfile: Dockerfile
      args:
        - ENABLE_PROXY=true
        - PROXY_URL=http://192.168.151.18:3128
    image: quant-strategy:dev
    container_name: quant-strategy-dev
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8084
      - CLICKHOUSE_HOST=127.0.0.1
      - CLICKHOUSE_PORT=9000
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
    volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/quant-strategy:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 数据 API (仅 41 运行)
  # ---------------------------------------------------------------------------
  
  get-stockdata:
    build:
      context: ./services/get-stockdata
      dockerfile: Dockerfile
      args:
        - ENABLE_PROXY=true
        - PROXY_URL=http://192.168.151.18:3128
    image: get-stockdata:latest
    container_name: get-stockdata-api-dev
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8083
      - CLICKHOUSE_HOST=127.0.0.1
      - REDIS_HOST=127.0.0.1
      - MOOTDX_API_URL=http://127.0.0.1:8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./libs/gsd-shared:/app/libs/gsd-shared:ro
      - ./logs/get-stockdata:/app/logs
      - ./data/snapshots:/app/data/snapshots

  # ---------------------------------------------------------------------------
  # 盘中快照录制器 (NEW)
  # ---------------------------------------------------------------------------
  
  # snapshot-recorder:
  #   image: get-stockdata:latest
  #   container_name: snapshot-recorder
  #   network_mode: host
  #   restart: unless-stopped
  #   command: python3 -m src.core.recorder.snapshot_recorder
